<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Schedule Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: rgba(0, 0, 0, 0.2);
            --green: rgba(46, 204, 113, 0.75);
            --red: rgba(231, 76, 60, 0.75);
            --green-glow: 0 0 15px rgba(46, 204, 113, 0.5);
            --red-glow: 0 0 15px rgba(231, 76, 60, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e0b36, #3b185f, #220e3a, #0b132b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Decorative Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #ff2a5f;
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #00d2ff;
            bottom: -150px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, 50px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px var(--glass-shadow);
            z-index: 1;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        p.subtitle {
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 18px;
            outline: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
            letter-spacing: 3px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            font-weight: 400;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .month-header {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .day-name {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .day-cell.empty {
            background: transparent;
        }

        /* Status colors */
        .day-cell.allowed {
            background: var(--green);
            border-color: rgba(46, 204, 113, 0.8);
            box-shadow: var(--green-glow);
            color: #fff;
            transform: scale(1.05);
        }

        .day-cell.banned {
            background: var(--red);
            border-color: rgba(231, 76, 60, 0.8);
            box-shadow: var(--red-glow);
            color: #fff;
            opacity: 0.8;
        }

        .day-cell.today {
            border: 2px solid white;
            font-weight: 700;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.green {
            background: var(--green);
            box-shadow: var(--green-glow);
        }

        .dot.red {
            background: var(--red);
            box-shadow: var(--red-glow);
        }

        .month-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .month-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .month-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .month-btn.active {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
        }

        /* Animation class */
        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-container">
        <h1>ယာဉ်မောင်းနှင်ခွင့် စစ်ဆေးရန်</h1>
        <p class="subtitle">Check your car number for odd/even driving days</p>

        <div class="input-group">
            <div class="input-wrapper">
                <input type="text" id="carNumber" placeholder="e.g. 1K or 2K" maxlength="10" autocomplete="off">
            </div>
        </div>

        <div class="month-selector" id="monthSelector">
            <button class="month-btn active" data-month="2">March 2026</button>
            <button class="month-btn" data-month="3">April 2026</button>
            <button class="month-btn" data-month="4">May 2026</button>
        </div>

        <div class="calendar" id="calendarGrid">
            <!-- Day Names -->
            <div class="day-name">Sun</div>
            <div class="day-name">Mon</div>
            <div class="day-name">Tue</div>
            <div class="day-name">Wed</div>
            <div class="day-name">Thu</div>
            <div class="day-name">Fri</div>
            <div class="day-name">Sat</div>
            <!-- Calendar Days injected via JS -->
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="dot green"></div> Allowed
            </div>
            <div class="legend-item">
                <div class="dot red"></div> Not Allowed
            </div>
        </div>
    </div>

    <script>
        const carInput = document.getElementById('carNumber');
        const calendarGrid = document.getElementById('calendarGrid');
        const currentYear = 2026;
        let targetMonth = 2; // Default to March (0-indexed)

        const today = new Date();
        const currentDate = today.getDate();

        const monthBtns = document.querySelectorAll('.month-btn');

        monthBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                monthBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                targetMonth = parseInt(e.target.dataset.month, 10);
                generateCalendar();
                updateSchedule();
            });
        });

        function generateCalendar() {
            const isCurrentMonth = today.getFullYear() === currentYear && today.getMonth() === targetMonth;

            // Clear existing days (keep day names)
            const dayNames = Array.from(calendarGrid.querySelectorAll('.day-name'));
            calendarGrid.innerHTML = '';
            dayNames.forEach(name => calendarGrid.appendChild(name));

            const firstDay = new Date(currentYear, targetMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, targetMonth + 1, 0).getDate();

            // Empty cells before the 1st
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('day-cell', 'empty');
                calendarGrid.appendChild(emptyCell);
            }

            // Create days
            for (let i = 1; i <= daysInMonth; i++) {
                const dayCell = document.createElement('div');
                dayCell.classList.add('day-cell');
                dayCell.textContent = i;
                dayCell.dataset.day = i;

                if (isCurrentMonth && i === currentDate) {
                    dayCell.classList.add('today');
                }

                calendarGrid.appendChild(dayCell);
            }
        }

        function updateSchedule() {
            const inputVal = carInput.value.trim();
            const days = document.querySelectorAll('.day-cell:not(.empty)');

            // Remove previous styling
            days.forEach(day => {
                day.classList.remove('allowed', 'banned', 'pop-in');
            });

            if (!inputVal) return;

            // Extract the first number found in the input string
            const match = inputVal.match(/\d/);

            if (match) {
                const firstDigit = parseInt(match[0], 10);
                const isCarEven = firstDigit % 2 === 0;

                days.forEach((day, index) => {
                    const dayNum = parseInt(day.dataset.day, 10);
                    const isDayEven = dayNum % 2 === 0;

                    setTimeout(() => {
                        // User Logic:
                        // Even car number (2K, 4K) -> Even days Allowed, Odd days Not Allowed
                        // Odd car number (1K, 3K) -> Odd days Allowed, Even days Not Allowed
                        if (isCarEven === isDayEven) {
                            day.classList.add('allowed', 'pop-in');
                        } else {
                            day.classList.add('banned', 'pop-in');
                        }
                    }, index * 10); // Staggered animation effect
                });
            }
        }

        // Initialize Calendar
        generateCalendar();

        // Listen for user input
        carInput.addEventListener('input', updateSchedule);
    </script>
</body>

</html>
